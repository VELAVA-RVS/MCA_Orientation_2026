<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f8f9fa;
            color: #333;
        }

        /* Navbar */

        nav {
            background: #222;
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h2 {
            color: #fff;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            transition: .3s;
        }

        nav ul li a:hover,
        nav ul li a.active {
            color: maroon;
        }

        /* Header */

        .header {
            text-align: center;
            padding: 60px 20px;
            background: maroon;
            color: white;
        }

        .header h1 {
            font-size: 40px;
        }

        /* Contact */

        .contact {
            width: 90%;
            max-width: 1100px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .contact-info {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }

        .contact-info h2 {
            margin-bottom: 20px;
        }

        .contact-info p {
            margin: 15px 0;
        }

        .contact-info i {
            color: maroon;
            margin-right: 10px;
        }

        .contact-form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }

        .contact-form h2 {
            margin-bottom: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        .contact-form textarea {
            resize: none;
        }

        .contact-form button {
            width: 100%;
            padding: 12px;
            border: none;
            background: maroon;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 6px;
            transition: .3s;
        }

        .contact-form button:hover {
            background: maroon;
        }

        /* Map */

        .map {
            width: 90%;
            max-width: 1100px;
            margin: auto;
            margin-bottom: 50px;
        }

        .map iframe {
            width: 100%;
            height: 350px;
            border: 0;
            border-radius: 10px;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav>
        <h2>My Website</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="schedule.html">Schedule</a></li>
            <li><a href="speakers.html">Speakers</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <!-- Header -->

    <section class="header">
        <h1>Contact Us</h1>
    </section>

    <!-- Contact Section -->

    <section class="contact">

        <div class="contact-info">
            <h2>Get In Touch</h2>

            <p><i class="fas fa-map-marker-alt"></i> Coimbatore, Tamil Nadu</p>

            <p><i class="fas fa-phone"></i> +91 98765 43210</p>

            <p><i class="fas fa-envelope"></i> info@example.com</p>

            <p><i class="fas fa-clock"></i> Mon - Sat : 9 AM - 6 PM</p>

        </div>

        <div class="contact-form">

            <h2>Send Message</h2>

            <form>

                <input type="text" placeholder="Your Name" required>

                <input type="email" placeholder="Your Email" required>

                <input type="text" placeholder="Subject">

                <textarea rows="6" placeholder="Your Message"></textarea>

                <button type="submit">Send Message</button>

            </form>

        </div>

    </section>

    <!-- Google Map -->

    <!-- <section class="map">

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." loading="lazy"></iframe>

    </section> -->

    <!-- Footer -->

    <footer>
        <p>&copy; 2026 My Website | All Rights Reserved.</p>
    </footer>

</body>

</html>
